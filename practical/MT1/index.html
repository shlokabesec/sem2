<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="parent">
        <h1>Result Calculator</h1>
        <input type="number" id="subjects" name="subjects" placeholder="Enter no. of subjects">
        <button id="submit" onclick="calculateResult()">Submit</button>
        <div id="result" class="card">
            <p class="hint">No data yet.</p>
        </div>
    </div>

    

    <script src="script.js"></script>

</body>
</html>
